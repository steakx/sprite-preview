services:
  sprite-preview:
    build:
      context: .
      dockerfile: Dockerfile
    image: sprite-preview:latest
    container_name: sprite-preview
    restart: unless-stopped
    ports:
      - "3988:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      # 可选：挂载日志目录
      - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai